<!DOCTYPE html>
<html>
<head>
<title>Register as a Car Services Provider - Velix</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f8fafc;
margin:0;
text-align:center;
}

header{
background:#0f172a;
color:white;
padding:40px;
}

.card{
background:white;
margin:20px auto;
padding:20px;
max-width:600px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#2563eb;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

a{
text-decoration:none;
color:#2563eb;
font-weight:bold;
display:block;
margin-top:20px;
}
</style>

</head>

<body>

<header>
<h1>Register as a Service Provider</h1>
</header>

<div class="card">

<input type="text" placeholder="Business or Service Name">

<input type="text" placeholder="Full Name">

<input type="text" placeholder="Country">

<input type="text" placeholder="State">

<input type="text" placeholder="City">

<input type="tel" placeholder="Phone Number">

<input type="email" placeholder="Email Address">

<input type="text" value="Car Services" readonly>

<br><br>

<button>Submit Registration</button>

<a href="car-services.html">⬅ Back to Car Services</a>

</div>

</body>
</html>
